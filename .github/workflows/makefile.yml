name: Build libamarhook.dylib

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Build fishhook (lightweight)
        run: |
          git clone https://github.com/facebook/fishhook.git
          cd fishhook
          xcrun --sdk iphoneos clang -arch arm64 -c -o fishhook.o fishhook.c -miphoneos-version-min=14.0
          ar rcs libfishhook.a fishhook.o
          cd ..
          mkdir -p lib include
          cp fishhook/libfishhook.a lib/
          cp fishhook/fishhook.h include/

      - name: Build libamarhook.dylib
        run: |
          xcrun --sdk iphoneos clang++ -arch arm64 -std=c++17 -O2 \
            -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
            -miphoneos-version-min=14.0 \
            -dynamiclib \
            -framework Foundation -framework CoreFoundation -framework Security -framework LocalAuthentication -framework IOKit \
            -I./include \
            -L./lib -lfishhook \
            -o libamarhook.dylib \
            amarhook.mm

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: libamarhook-dylib
          path: libamarhook.dylib
