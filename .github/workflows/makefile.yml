name: Build UniversalHook with Theos (macOS)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          if [ ! -d "$HOME/theos" ]; then
            git clone --recursive https://github.com/theos/theos.git $HOME/theos
          fi
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH

      - name: Prepare dependencies (fishhook & Dobby)
        run: |
          mkdir -p include lib
          git clone --depth 1 https://github.com/facebook/fishhook.git
          cp fishhook/fishhook.h include/
          git clone --depth 1 https://github.com/jmpews/Dobby.git
          cd Dobby
          mkdir -p build && cd build
          cmake .. -DDOBBY_GENERATE_SHARED=OFF -DCMAKE_BUILD_TYPE=Release
          make -j$(sysctl -n hw.ncpu)
          cd ../..
          cp Dobby/include/dobby.h include/
          cp Dobby/build/libdobby.a lib/

      - name: Create required Theos files
        run: |
          cat > control << 'EOF'
          Package: com.yourcompany.universalhook
          Name: UniversalHook
          Version: 1.0
          Architecture: darwin-arm64
          Description: User-Space API Spoofer with Dobby & fishhook
          Maintainer: Your Name
          Author: Your Name
          Section: System
          EOF

      - name: Build dylib with Theos
        run: |
          make clean
          make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UniversalHook.dylib
          path: .theos/obj/UniversalHook.dylib
